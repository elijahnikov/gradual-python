name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout gradual-sdk-spec
        uses: actions/checkout@v4
        with:
          repository: elijahnikov/gradual-sdk-spec
          path: gradual-sdk-spec

      - name: Symlink spec to sibling path
        run: ln -s "$GITHUB_WORKSPACE/gradual-sdk-spec" ../gradual-sdk-spec

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: PYTHONPATH=src pytest tests/ -v
